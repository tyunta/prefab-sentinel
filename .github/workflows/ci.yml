name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: uv sync --extra lint

      - name: Ruff check
        run: uv run ruff check prefab_sentinel/ tests/ scripts/ tools/

      - name: Mypy
        run: uv run mypy prefab_sentinel/

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: uv sync --extra test

      - name: Run Unit Tests
        run: uv run python scripts/run_unit_tests.py

  bridge-smoke-contract:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Package
        run: uv sync

      - name: Create stub project directories
        run: mkdir -p sample/avatar sample/world

      - name: Run Bridge Smoke Batch (Expected Failure Contract)
        run: |
          uv run prefab-sentinel validate smoke-batch \
            --targets all \
            --avatar-plan config/patch_plan.example.json \
            --world-plan config/patch_plan.example.json \
            --avatar-project-path sample/avatar \
            --world-project-path sample/world \
            --avatar-expect-failure \
            --world-expect-failure \
            --avatar-expected-code BRIDGE_UNITY_COMMAND_MISSING \
            --world-expected-code BRIDGE_UNITY_COMMAND_MISSING \
            --out-dir reports/bridge_smoke \
            --summary-md reports/bridge_smoke/summary.md

      - name: Build Bridge Smoke Decision Table Artifacts
        run: |
          uv run prefab-sentinel report smoke-history \
            --inputs reports/bridge_smoke/summary.json \
            --duration-percentile 90 \
            --out reports/bridge_smoke/history.csv \
            --out-md reports/bridge_smoke/history.md \
            --out-timeout-profile reports/bridge_smoke/timeout_profile.json \
            --max-code-mismatches 0 \
            --min-code-pass-pct 100

      - name: Upload Bridge Smoke Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bridge-smoke-reports
          path: reports/bridge_smoke

  integration-test-contract:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Package
        run: uv sync

      - name: Run Integration Test Contract (Expected Failure)
        run: |
          set +e
          uv run prefab-sentinel validate integration-tests \
            --unity-command /nonexistent/Unity.exe \
            --unity-project-path /tmp/fake_project \
            --out-dir reports/integration \
            --skip-deploy
          exit_code=$?
          if [ "$exit_code" -eq 0 ]; then
            echo "ERROR: Expected non-zero exit code but got 0"
            exit 1
          fi
          echo "Contract test passed: exit code $exit_code (expected non-zero)"
